version: '3.9'

services:
  db:
    image: postgres:15
    container_name: optica-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-optica}
      POSTGRES_USER: ${POSTGRES_USER:-optica}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-optica}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U optica -d optica"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: optica-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: optica-keycloak
    restart: unless-stopped
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8080:8080"
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
        context: .
        dockerfile: infra/docker/Dockerfile.api
    container_name: optica-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
        - "8000:8000"
    volumes:
        - ./backend:/app/backend
    depends_on:
        db:
          condition: service_healthy
        rabbitmq:
          condition: service_healthy

volumes:
  postgres_data:
  rabbitmq_data: